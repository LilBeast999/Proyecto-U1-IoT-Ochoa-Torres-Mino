# ============================================================
#  Mosquitto - SmartHome IoT (Unidad 2)
#  MQTT seguro: autenticacion + cifrado TLS + ACLs
# ============================================================

# --- Persistencia y logs ---
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# --- Seguridad: sin acceso anonimo ---
allow_anonymous false
password_file /mosquitto/config/passwordfile

# --- Control de acceso por topico (ACL) ---
acl_file /mosquitto/config/aclfile

# ------------------------------------------------------------
#  Listener TLS (MQTT seguro) en el puerto 8883
# ------------------------------------------------------------
listener 8883
cafile   /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile  /mosquitto/config/certs/server.key

# Solo TLS 1.2 (compatible con WiFiClientSecure del ESP32)
tls_version tlsv1.2

# Los clientes solo validan al servidor; no presentan certificado propio.
# (TLS de servidor: suficiente para el curso. Para TLS mutuo, poner true.)
require_certificate false

# ------------------------------------------------------------
#  (Opcional) Listener 1883 SOLO local, para depurar desde el host.
#  Dejalo comentado para cumplir "MQTT sin seguridad desactivado".
#  Si lo activas, queda accesible unicamente en 127.0.0.1, no en la red.
# ------------------------------------------------------------
# listener 1883 127.0.0.1
